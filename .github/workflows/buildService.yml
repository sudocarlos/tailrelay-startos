name: Build Service

on:
  workflow_dispatch:
  pull_request:
    paths-ignore: ['*.md', '.gitignore', 'AGENTS.md', '.agents/**']
    branches: ['main', 'master']
  push:
    paths-ignore: ['*.md', '.gitignore', 'AGENTS.md', '.agents/**']
    branches: ['main', 'master']

jobs:
  BuildPackage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86, arm]
    steps:
      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
        shell: bash

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install start-sdk
        run: |
          curl -fsSL -o /tmp/startbox.tar.gz \
            https://github.com/sudocarlos/tailrelay-startos/releases/download/sdk-bin-0.3.5.1/startbox-x86_64-linux.tar.gz
          sudo tar -xzf /tmp/startbox.tar.gz -C /usr/local/bin startbox
          sudo chmod +x /usr/local/bin/startbox
          sudo ln -sf /usr/local/bin/startbox /usr/local/bin/start-sdk
          sudo ln -sf /usr/local/bin/startbox /usr/local/bin/start-cli
          start-sdk --version
        shell: bash

      - name: Checkout services repository
        uses: actions/checkout@v4

      - name: Build the service package (${{ matrix.arch }})
        id: build
        run: |
          git submodule update --init --recursive
          start-sdk init
          make ${{ matrix.arch }}
          PACKAGE_ID=$(yq -oy ".id" manifest.*)
          mv ${PACKAGE_ID}.s9pk ${PACKAGE_ID}-${{ matrix.arch }}.s9pk
          echo "package_id=$PACKAGE_ID" >> $GITHUB_ENV
          echo "package_filename=${PACKAGE_ID}-${{ matrix.arch }}.s9pk" >> $GITHUB_ENV
          printf "\n SHA256SUM: $(sha256sum ${PACKAGE_ID}-${{ matrix.arch }}.s9pk) \n"
        shell: bash

      - name: Upload .s9pk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.package_filename }}
          path: ./${{ env.package_filename }}
